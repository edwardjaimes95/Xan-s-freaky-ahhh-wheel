<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xan's Freaky Ahhh Wheel</title>
  <style>
    :root {
      --bg-1: #17001f;
      --bg-2: #3b0755;
      --panel: rgba(255,255,255,.10);
      --panel-border: rgba(255,255,255,.18);
      --text: #fff7ff;
      --muted: #e8c9ef;
      --accent: #ff4fd8;
      --accent-2: #a855f7;
      --danger: #ff5c7a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,79,216,.22), transparent 32%),
        radial-gradient(circle at 80% 20%, rgba(168,85,247,.25), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .45;
      background-image:
        radial-gradient(circle, white 0 1px, transparent 1.5px),
        radial-gradient(circle, #ff9bea 0 1px, transparent 1.5px);
      background-size: 42px 42px, 67px 67px;
      background-position: 0 0, 15px 18px;
      animation: drift 14s linear infinite;
    }

    @keyframes drift {
      to { background-position: 42px 42px, 82px 85px; }
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0 48px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.6rem);
      line-height: .98;
      text-shadow: 0 0 28px rgba(255,79,216,.55);
    }

    .tagline {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.3rem);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, .7fr);
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,.28);
    }

    .wheel-panel {
      display: grid;
      place-items: center;
      min-height: 620px;
    }

    .wheel-wrap {
      position: relative;
      width: min(90vw, 570px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.4));
      transition: transform 5s cubic-bezier(.15,.8,.15,1);
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 48px solid #fff;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,.35));
      z-index: 4;
    }

    .spin-button {
      position: absolute;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      border: 7px solid rgba(255,255,255,.8);
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 900;
      font-size: 1.25rem;
      letter-spacing: .08em;
      cursor: pointer;
      box-shadow: 0 0 0 8px rgba(40,0,55,.45), 0 0 30px rgba(255,79,216,.65);
      transition: transform .18s ease, filter .18s ease;
      z-index: 3;
    }

    .spin-button:hover { transform: scale(1.05); filter: brightness(1.12); }
    .spin-button:disabled { cursor: not-allowed; filter: grayscale(.5); }

    .controls h2 {
      margin: 0 0 6px;
    }

    .save-note {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: .92rem;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(15,0,25,.42);
      color: white;
      border-radius: 12px;
      padding: 12px 13px;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,79,216,.2);
    }

    button.action {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
    }

    .option-list {
      display: grid;
      gap: 9px;
      max-height: 430px;
      overflow: auto;
      padding-right: 4px;
    }

    .option {
      display: grid;
      grid-template-columns: 18px minmax(0,1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.75);
    }

    .option input {
      padding: 8px 9px;
      background: transparent;
      border-color: transparent;
    }

    .option input:focus {
      background: rgba(0,0,0,.16);
      border-color: rgba(255,255,255,.25);
      box-shadow: none;
    }

    .delete {
      border: 0;
      width: 35px;
      height: 35px;
      border-radius: 10px;
      color: white;
      background: rgba(255,92,122,.2);
      cursor: pointer;
      font-size: 1rem;
    }

    .delete:hover { background: rgba(255,92,122,.42); }

    .reset {
      margin-top: 14px;
      width: 100%;
      background: transparent !important;
      border: 1px solid rgba(255,255,255,.24) !important;
    }

    .status {
      text-align: center;
      min-height: 27px;
      margin-top: 14px;
      color: var(--muted);
    }

    .winner-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(15,0,25,.72);
      backdrop-filter: blur(10px);
    }

    .winner-overlay.show {
      display: grid;
      animation: fadeIn .25s ease both;
    }

    .winner-card {
      width: min(560px, 95vw);
      text-align: center;
      border-radius: 28px;
      border: 2px solid rgba(255,255,255,.4);
      background: linear-gradient(145deg, rgba(255,79,216,.96), rgba(107,33,168,.96));
      padding: 34px 24px;
      box-shadow: 0 30px 90px rgba(0,0,0,.52);
      animation: pop .45s cubic-bezier(.2,.9,.2,1.3) both;
    }

    .winner-small {
      font-size: 1rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: .88;
    }

    .winner-text {
      margin: 12px 0 20px;
      font-size: clamp(2.2rem, 8vw, 5rem);
      line-height: 1;
      font-weight: 1000;
      overflow-wrap: anywhere;
      text-shadow: 0 5px 20px rgba(0,0,0,.28);
    }

    .winner-card button {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      font-weight: 900;
      cursor: pointer;
      background: white;
      color: #681163;
    }

    @keyframes fadeIn { from { opacity: 0; } }
    @keyframes pop {
      from { opacity: 0; transform: scale(.6) rotate(-4deg); }
      to { opacity: 1; transform: scale(1) rotate(0); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 18px;
      z-index: 25;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(900deg); opacity: .9; }
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .wheel-panel { min-height: auto; }
      .controls { order: -1; }
    }

    @media (max-width: 520px) {
      .page { width: min(100% - 16px, 1180px); padding-top: 22px; }
      .panel { padding: 14px; border-radius: 18px; }
      .spin-button { width: 92px; height: 92px; font-size: 1rem; }
      .pointer {
        border-left-width: 17px;
        border-right-width: 17px;
        border-top-width: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles"></div>

  <main class="page">
    <header>
      <h1>💖 Xan's Freaky Ahhh Wheel 💖</h1>
      <p class="tagline">Spin if you dare... 😈</p>
    </header>

    <section class="layout">
      <div class="panel wheel-panel">
        <div>
          <div class="wheel-wrap">
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="wheel" width="900" height="900" aria-label="Prize wheel"></canvas>
            <button id="spinBtn" class="spin-button" type="button">SPIN</button>
          </div>
          <div id="status" class="status" aria-live="polite">Add your choices, then spin the wheel.</div>
        </div>
      </div>

      <aside class="panel controls">
        <h2>Wheel Sections</h2>
        <p class="save-note">Your changes save automatically on this device.</p>

        <div class="add-row">
          <input id="newOption" maxlength="40" placeholder="Add a new section..." aria-label="New wheel section" />
          <button id="addBtn" class="action" type="button">Add</button>
        </div>

        <div id="optionList" class="option-list"></div>
        <button id="resetBtn" class="action reset" type="button">Reset Default Sections</button>
      </aside>
    </section>
  </main>

  <div id="winnerOverlay" class="winner-overlay" role="dialog" aria-modal="true" aria-labelledby="winnerText">
    <div class="winner-card">
      <div class="winner-small">The wheel chose</div>
      <div id="winnerText" class="winner-text"></div>
      <button id="closeWinner" type="button">Spin Again 😈</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "xans-freaky-wheel-v1";
    const defaults = [
      "Kiss",
      "Cuddle",
      "Movie Night",
      "Massage",
      "Surprise Date",
      "Truth",
      "Dare",
      "Ice Cream Run"
    ];

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const addBtn = document.getElementById("addBtn");
    const resetBtn = document.getElementById("resetBtn");
    const newOption = document.getElementById("newOption");
    const optionList = document.getElementById("optionList");
    const status = document.getElementById("status");
    const winnerOverlay = document.getElementById("winnerOverlay");
    const winnerText = document.getElementById("winnerText");
    const closeWinner = document.getElementById("closeWinner");

    let rotation = 0;
    let spinning = false;

    function randomColor() {
      const hue = Math.floor(Math.random() * 360);
      const sat = 72 + Math.floor(Math.random() * 18);
      const light = 47 + Math.floor(Math.random() * 12);
      return `hsl(${hue} ${sat}% ${light}%)`;
    }

    function makeItems(labels) {
      return labels.map(label => ({ label, color: randomColor() }));
    }

    function loadItems() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved) && saved.length >= 2) return saved;
      } catch (error) {}
      return makeItems(defaults);
    }

    let items = loadItems();

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function drawWheel() {
      const size = canvas.width;
      const center = size / 2;
      const radius = center - 18;
      ctx.clearRect(0, 0, size, size);

      const slice = (Math.PI * 2) / items.length;

      items.forEach((item, index) => {
        const start = index * slice - Math.PI / 2;
        const end = start + slice;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = item.color;
        ctx.fill();

        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(255,255,255,.78)";
        ctx.stroke();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "rgba(0,0,0,.38)";
        ctx.lineWidth = 7;

        const fontSize = Math.max(24, Math.min(42, 480 / Math.max(items.length, 6)));
        ctx.font = `900 ${fontSize}px system-ui, sans-serif`;

        let text = item.label;
        const maxWidth = radius * .65;
        while (ctx.measureText(text).width > maxWidth && text.length > 5) {
          text = text.slice(0, -2).trim() + "…";
        }

        ctx.strokeText(text, radius - 38, 0);
        ctx.fillText(text, radius - 38, 0);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.lineWidth = 14;
      ctx.strokeStyle = "rgba(255,255,255,.9)";
      ctx.stroke();
    }

    function renderOptions() {
      optionList.innerHTML = "";

      items.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "option";

        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = item.color;
        swatch.title = "Random slice color";

        const input = document.createElement("input");
        input.value = item.label;
        input.maxLength = 40;
        input.setAttribute("aria-label", `Edit section ${index + 1}`);
        input.addEventListener("input", () => {
          item.label = input.value || `Section ${index + 1}`;
          saveItems();
          drawWheel();
        });

        const del = document.createElement("button");
        del.className = "delete";
        del.type = "button";
        del.textContent = "✕";
        del.setAttribute("aria-label", `Delete ${item.label}`);
        del.addEventListener("click", () => {
          if (items.length <= 2) {
            status.textContent = "The wheel needs at least two sections.";
            return;
          }
          items.splice(index, 1);
          saveItems();
          renderOptions();
          drawWheel();
        });

        row.append(swatch, input, del);
        optionList.appendChild(row);
      });
    }

    function addOption() {
      const label = newOption.value.trim();
      if (!label) {
        newOption.focus();
        return;
      }

      items.push({ label, color: randomColor() });
      newOption.value = "";
      saveItems();
      renderOptions();
      drawWheel();
      status.textContent = `"${label}" was added and saved.`;
      newOption.focus();
    }

    function normalizeDegrees(value) {
      return ((value % 360) + 360) % 360;
    }

    function celebrate() {
      const colors = ["#ff4fd8", "#a855f7", "#ffffff", "#ffd166", "#56e0ff"];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = `${2.2 + Math.random() * 2.3}s`;
        piece.style.animationDelay = `${Math.random() * .4}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5200);
      }
    }

    function spin() {
      if (spinning || items.length < 2) return;

      spinning = true;
      spinBtn.disabled = true;
      status.textContent = "The wheel is deciding... 👀";

      const winnerIndex = Math.floor(Math.random() * items.length);
      const sliceDegrees = 360 / items.length;
      const winnerCenter = winnerIndex * sliceDegrees + sliceDegrees / 2;

      const current = normalizeDegrees(rotation);
      const desired = normalizeDegrees(360 - winnerCenter);
      const adjustment = normalizeDegrees(desired - current);
      const extraTurns = 6 + Math.floor(Math.random() * 3);

      rotation += extraTurns * 360 + adjustment;
      canvas.style.transform = `rotate(${rotation}deg)`;

      setTimeout(() => {
        spinning = false;
        spinBtn.disabled = false;
        winnerText.textContent = items[winnerIndex].label;
        winnerOverlay.classList.add("show");
        status.textContent = `Winner: ${items[winnerIndex].label} 🎉`;
        celebrate();
      }, 5100);
    }

    addBtn.addEventListener("click", addOption);
    newOption.addEventListener("keydown", event => {
      if (event.key === "Enter") addOption();
    });

    spinBtn.addEventListener("click", spin);

    closeWinner.addEventListener("click", () => {
      winnerOverlay.classList.remove("show");
      spinBtn.focus();
    });

    winnerOverlay.addEventListener("click", event => {
      if (event.target === winnerOverlay) winnerOverlay.classList.remove("show");
    });

    resetBtn.addEventListener("click", () => {
      items = makeItems(defaults);
      saveItems();
      renderOptions();
      drawWheel();
      status.textContent = "Default sections restored with new random colors.";
    });

    renderOptions();
    drawWheel();
  </script>
</body>
</html>
